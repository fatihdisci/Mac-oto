name: Sync to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Prepare requirements.txt for HF
        run: cp hf_requirements.txt requirements.txt

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add requirements.txt
          git commit -m "hf: add requirements.txt" || echo "nothing to commit"
          git remote add hf https://fffddd35:$HF_TOKEN@huggingface.co/spaces/fffddd35/Macoto35
          git push hf main --force
