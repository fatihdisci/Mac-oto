name: Sync to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Prepare requirements.txt for HF
        run: cp hf_requirements.txt requirements.txt

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path=".",
              repo_id="fffddd35/Macoto35",
              repo_type="space",
              ignore_patterns=[
                  ".git",
                  ".github",
                  ".gitignore",
                  "hf_requirements.txt",
                  "output",
                  "data/logos",
                  "data/all_teams.json",
                  "data/selected_match.json",
                  "data/sync_manifest.json",
                  "data/teams",
                  "__pycache__",
                  "*.pyc",
                  ".venv",
                  "venv",
                  "*.log",
              ],
          )
          print("HF Space sync tamamlandi!")
          PYEOF
